<div class="audio-container">
    <!-- Audio Player -->
    <audio id="audioPlayer" controls>
        <source id="audioSource" src="Don Toliver - Bus Stop.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Controls for Previous, Play, and Next -->
    <div class="audio-controls">
        <button onclick="previousSong()">Previous</button>
        <button onclick="togglePlayPause()">Play/Pause</button>
        <button onclick="nextSong()">Next</button>
    </div>

    <!-- Current Song Display -->
    <div id="currentSong" class="current-song">Currently Playing : Don Toliver - Bus Stop</div>
</div>

<!-- Real-Time Clock -->
<div id="clock" class="clock"></div>

<footer>
    <p> @MIROLLDOWH</p>
</footer>

<script>
    // Array of songs
    const songs = [
        { title: "Don Toliver - Bus Stop", url: "Don Toliver - Bus Stop.mp3" },
        { title: "Don Toliver - Honeymoon", url: "Don Toliver - Honeymoon.mp3" },
        { title: "Don Toliver - Tore Up", url: "Don Toliver- Tore Up.mp3" },
        { title: "Don Toliver - New Drop", url: "Don Toliver - New drop.mp3" },
        { title: "Don Toliver - Time heal All", url: "Don Toliver - Time heall All.mp3" }
    ];

    let currentSongIndex = 0;

    const audioPlayer = document.getElementById("audioPlayer");
    const audioSource = document.getElementById("audioSource");
    const currentSongDisplay = document.getElementById("currentSong");

    // Update the current song
    function updateSong() {
        const currentSong = songs[currentSongIndex];
        audioSource.src = currentSong.url;
        audioPlayer.load(); // Reload the audio element to update the source
        currentSongDisplay.textContent = "Currently Playing: " + currentSong.title;
    }

    // Play/Pause functionality
    function togglePlayPause() {
        if (audioPlayer.paused) {
            audioPlayer.play();
        } else {
            audioPlayer.pause();
        }
    }

    // Next song functionality
    function nextSong() {
        currentSongIndex = (currentSongIndex + 1) % songs.length; // Loop back to the first song
        updateSong();
        audioPlayer.play();
    }

    // Previous song functionality
    function previousSong() {
        currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length; // Loop to last song
        updateSong();
        audioPlayer.play();
    }

    // Initialize the first song
    updateSong();

    // Function to update the time every second
    function updateClock() {
        const clockElement = document.getElementById('clock');
        const currentDate = new Date();
        let hours = currentDate.getHours();
        let minutes = currentDate.getMinutes();
        let seconds = currentDate.getSeconds();

        // Add leading zeros to minutes and seconds
        minutes = minutes < 10 ? '0' + minutes : minutes;
        seconds = seconds < 10 ? '0' + seconds : seconds;

        // Format the time string
        const timeString = hours + ':' + minutes + ':' + seconds;

        // Display the time in the clock element
        clockElement.textContent = timeString;
    }

    // Update the clock every second
    setInterval(updateClock, 1000);

    // Initialize clock on page load
    updateClock();
</script>
